<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#050509"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- Hintergrund -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)" rx="96" ry="96"/>

  <!-- Route-Kreis -->
  <circle cx="256" cy="220" r="140"
          fill="none"
          stroke="#22c55e"
          stroke-width="16"
          stroke-linecap="round"
          stroke-dasharray="12 10"/>

  <!-- Zielpunkt oben -->
  <circle cx="256" cy="80" r="10" fill="#22c55e"/>

  <!-- Bike-Glyph unten -->
  <g transform="translate(156,300) scale(1.3)">
    <!-- Räder -->
    <circle cx="40" cy="60" r="24" fill="none" stroke="#e5e7eb" stroke-width="8"/>
    <circle cx="120" cy="60" r="24" fill="none" stroke="#e5e7eb" stroke-width="8"/>

    <!-- Rahmen -->
    <polyline points="40,60 72,30 110,30 120,60 88,60 72,30"
              fill="none"
              stroke="#e5e7eb"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"/>

    <!-- Lenker -->
    <line x1="110" y1="30" x2="132" y2="18"
          stroke="#e5e7eb"
          stroke-width="8"
          stroke-linecap="round"/>

    <!-- Sattel -->
    <line x1="72" y1="30" x2="56" y2="18"
          stroke="#e5e7eb"
          stroke-width="8"
          stroke-linecap="round"/>
  </g>
</svg>